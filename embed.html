  <div data-urdfw-embed data-mode="grid" data-count="6"></div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const el = document.querySelector('[data-urdfw-embed]');
      if (el) {
        el.dataset.mode = params.get('mode') || 'grid';
        el.dataset.count = params.get('count') || '6';
      }
      function boot() {
        const P = window.URDFWPlatform;
        if (!P || !P.initWidgetsOnPage) return setTimeout(boot, 80);
        fetch(P.resolveAsset('data/churches.json'))
          .then((r) => r.json())
          .then((listings) => P.initWidgetsOnPage(listings))
          .catch((e) => console.warn('[URDFW embed]', e.message));
      }
      window.addEventListener('urdfw:ready', boot);
      if (document.readyState !== 'loading') setTimeout(boot, 1200);
    })();
  </script>
