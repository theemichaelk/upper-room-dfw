<body class="max-w-2xl mx-auto p-6">
  <h1 class="text-2xl font-bold">Shortcode Generator (30+ params)</h1>
  <div class="mt-4 space-y-3 bg-white border rounded-xl p-6">
    <select id="sc-type" class="w-full border rounded px-3 py-2">
      <option value="listings">listings</option><option value="map">map</option><option value="search">search</option>
      <option value="categories">categories</option><option value="slider">slider</option><option value="featured">featured</option>
    </select>
    <div id="sc-params" class="grid grid-cols-2 gap-2 text-sm"></div>
    <button onclick="generate()" class="px-4 py-2 bg-[#0369a1] text-white rounded">Generate</button>
    <pre id="sc-output" class="shortcode-output mt-3"></pre>
    <h3 class="font-semibold mt-4">Embed Code</h3>
    <pre id="embed-output" class="shortcode-output"></pre>
  </div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    const fields = ['count','category','area','layout','height','zoom','sort','featured','radius','columns','color','template'];
    document.getElementById('sc-params').innerHTML = fields.map(f =>
      `<label class="block"><span class="text-xs">${f}</span><input data-param="${f}" class="w-full border rounded px-2 py-1"></label>`).join('');
    function generate() {
      const P = window.URDFWPlatform;
      const type = document.getElementById('sc-type').value;
      const params = { type };
      document.querySelectorAll('[data-param]').forEach(inp => { if (inp.value) params[inp.dataset.param] = inp.value; });
      const code = P.generateShortcode(type, params);
      document.getElementById('sc-output').textContent = code;
      document.getElementById('embed-output').textContent = P.getEmbedCode({ mode: params.layout || 'grid', count: params.count || 6 });
    }
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
