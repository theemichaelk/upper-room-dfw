  <h1 class="text-2xl font-bold">User Directory</h1>
  <p class="text-sm text-slate-600">Roles assigned by membership package.</p>
  <div id="users" class="mt-4 space-y-2"></div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    setTimeout(() => {
      const P = window.URDFWPlatform;
      const users = P.getUserDirectory();
      const clients = P.get('clients', []);
      const all = [...users, ...clients.map(c => ({ id: c.id, name: c.name, email: c.email, role: P.getUserRole(c), area: c.area }))];
      document.getElementById('users').innerHTML = all.length ? all.map(u =>
        `<div class="border rounded p-3 flex justify-between text-sm"><div><strong>${u.name}</strong> <span class="text-slate-400">${u.email}</span></div><span class="px-2 py-0.5 bg-sky-100 rounded text-xs">${u.role}</span></div>`).join('') : '<p class="text-sm text-slate-500">No users yet. <a href="signup.html">Sign up</a></p>';
    }, 800);
  </script>
