version: 1
# Upper Room DFW — Express + static HTML (NOT Next.js — no .next folder)
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --omit=dev
    build:
      commands:
        # Regenerate blog drip (publishedAt gate) + sitemap before bundling static
        - node scripts/generate-blog.js
        - node scripts/generate-sitemap.js
        - node scripts/add-powered-by-footer.js
        - node scripts/build-amplify-bundle.js
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*