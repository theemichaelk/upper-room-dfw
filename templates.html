<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://upperroomdfw.com">
  <link rel="dns-prefetch" href="https://d4lzb9pq4mfuf.cloudfront.net">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0369a1">
  <meta name="format-detection" content="telephone=no">

  <meta charset="UTF-8">
  <title>Listing Templates | Upper Room DFW</title>
  <meta name="description" content="Choose single-page and multipage listing templates for DFW churches on Upper Room DFW.">
  <link rel="canonical" href="https://upperroomdfw.com/templates.html">
  <meta property="og:url" content="https://upperroomdfw.com/templates.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="p-6 max-w-5xl mx-auto">
  <h1 class="text-2xl font-bold">16 Single-Page + 2 Multi-Page Templates</h1>
  <p class="text-sm text-slate-600 mb-6">Click to preview with live church data.</p>
  <h2 class="font-semibold mb-2">Single-Page (16)</h2>
  <div id="single-tpls" class="grid grid-cols-4 gap-2 mb-8"></div>
  <h2 class="font-semibold mb-2">Multi-Page (2)</h2>
  <div id="multi-tpls" class="grid grid-cols-2 gap-2"></div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    const singles = ['classic','modern','minimal','magazine','card','hero','sidebar','fullwidth','dark','light','event','ministry','youth','outreach','catholic','network'];
    const multis = ['standard-multipage','premium-multipage'];
    const slug = 'the-grove-community-church';
    document.getElementById('single-tpls').innerHTML = singles.map(t =>
      `<a href="templates/single/${t}.html?slug=${slug}" class="tpl-preview border p-3 hover:bg-sky-50">${t}</a>`).join('');
    document.getElementById('multi-tpls').innerHTML = multis.map(t =>
      `<a href="templates/multi/${t}.html?slug=${slug}" class="tpl-preview border p-3 hover:bg-sky-50">${t}</a>`).join('');
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
