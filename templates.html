    const multis = ['standard-multipage','premium-multipage'];
    const slug = 'the-grove-community-church';
    document.getElementById('single-tpls').innerHTML = singles.map(t =>
      `<a href="templates/single/${t}.html?slug=${slug}" class="tpl-preview border p-3 hover:bg-sky-50">${t}</a>`).join('');
    document.getElementById('multi-tpls').innerHTML = multis.map(t =>
