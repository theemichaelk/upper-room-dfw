<body class="p-6 max-w-6xl mx-auto grid md:grid-cols-3 gap-4">
  <h1 class="md:col-span-3 text-2xl font-bold">Directory Widgets (Sidebar + On-Page)</h1>
  <div id="w-search"></div><div id="w-categories"></div><div id="w-locations"></div>
  <div id="w-listings"></div><div id="w-button"></div><div id="w-map"></div>
  <div id="w-slider" class="md:col-span-2"></div>
  <div id="w-onpage-listings"></div><div id="w-onpage-categories"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/platform/loader.js" defer></script>
  <script>
    (async () => {
      await new Promise(r => setTimeout(r, 1000));
      const P = window.URDFWPlatform;
      const res = await fetch('data/churches.json');
      const listings = await res.json();
      ['search','categories','locations','listings','button','map','slider'].forEach((t, i) => {
        const el = document.getElementById('w-' + t);
        P.renderWidget(t, el, { listings, count: 5, height: 200, label: 'Browse DFW Churches', url: 'directory.html' });
      });
      P.renderWidget('listings', document.getElementById('w-onpage-listings'), { listings, count: 3 });
      P.renderWidget('categories', document.getElementById('w-onpage-categories'), {});
    })();
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">

</body>
