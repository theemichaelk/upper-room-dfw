<body class="bg-slate-50 p-6 max-w-5xl mx-auto">
<!-- urdfw-body:v1 -->
<!-- /urdfw-body:v1 -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5LDRMLLJ" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>


  <h1 class="text-3xl font-bold mb-2">Platform Feature Checklist</h1>
  <p class="text-slate-600 mb-6">Live test status — refreshed on page load. <button onclick="runAllTests()" class="px-4 py-2 bg-[#0369a1] text-white rounded-lg text-sm">Run All Tests</button></p>
  <div id="checklist" class="space-y-4"></div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    const FEATURES = [
      { cat: 1, name: 'Fast responsive performance & flexible display', items: [
        'Ultra-fast responsive experience', 'Full responsive design', '4 display modes (grid/list/map/compact)',
        '16 single-page templates', '2 multi-page templates', 'Bootstrap-inspired responsive grid',
        'RTL support', 'Color/font/language customization'
      ]},
      { cat: 2, name: 'Advanced search, filtering, discovery', items: [
        'Advanced search & facet filters', 'AJAX faceted filtering', 'Live/instant search',
        'Location-based radius search', 'Search by categories & locations', 'Custom field search',
        'Search form on map', 'Draw search area on map', 'Instant tag filtering',
        'Sort by rating, distance, content fields'
      ]},
      { cat: 3, name: 'Listings, submissions, claim management', items: [
        'Add new listings', 'Claim existing listings', 'Paid claim options',
        'Frontend submission', 'Free & paid submission', 'Auto/admin approval',
        'Sticky, featured, VIP listings', 'Renew expired listings', 'Upgrade/downgrade levels',
        'Listing packages', 'Link duration & count', 'Featured at top'
      ]},
      { cat: 4, name: 'Custom fields & builders', items: [
        'Manage custom fields', 'Visual form editor', 'Custom field types',
        'Category-based fields', 'Font Awesome icons', 'Drag-drop form builder',
        'Drag-drop field builder', 'Custom post types/taxonomies', '30+ shortcode parameters'
      ]},
      { cat: 5, name: 'Maps & geospatial', items: [
        'Custom maps', 'Google Maps', 'MapBox', 'OpenStreetMap',
        'Custom map styles', 'Custom markers', 'Multiple locations', 'Multi-directory', 'OpenStreetMap integration'
      ]},
      { cat: 6, name: 'Reviews, ratings, engagement', items: [
        'Multi-criteria reviews', '1-5 star reviews', '5-star ratings', 'Rating breakdown',
        'Vote on reviews', 'Guest/logged upvoting', '5 upvote icons', 'Comments on listings'
      ]},
      { cat: 7, name: 'Media & export', items: [
        'Photos on listings/reviews', 'AJAX image upload', 'YouTube/Vimeo support',
        'Auto favicon from links', 'CSV import/export', 'CSV bulk importer', 'PDF/print listing'
      ]},
      { cat: 8, name: 'User accounts & membership', items: [
        'Full membership', 'User registration', 'Front-end dashboard', 'Profile settings',
        'Change password', 'Profile/banner upload', 'Saved listings & authors',
        'Messages & notifications', 'Free/one-time/recurring/trial packages', 'User roles by package', 'User directory'
      ]},
      { cat: 9, name: 'Monetization & billing', items: [
        'Paid listings', 'PayPal', 'Stripe', '2Checkout', 'WooCommerce-style checkout',
        'Invoices', 'Pricing tables', 'Coupons', 'Coupon limits/expiry', 'Recurring payments',
        'Charge for submission', 'Charge for claim', 'Ad blocks', 'URL masking'
      ]},
      { cat: 10, name: 'Admin & automation', items: [
        'Admin panel', 'Click statistics', 'Page settings', 'Auto SEO titles/descriptions',
        'Email templates', 'Welcome emails', 'Forgot password', 'Order emails', 'Subscription reminders',
        'Contact auto-reply & admin emails'
      ]},
      { cat: 11, name: 'Communication & integrations', items: [
        'Contact listing owner', 'Contact form plugin', 'Support form',
        'Mailchimp', 'Vbout', 'Acumbamail', 'Email template support'
      ]},
      { cat: 12, name: 'Embedding & widgets', items: [
        'Embed link lists', 'Shortcode embed', 'Directory shortcodes',
        'Directory widgets', '3 sidebar widgets', '4 on-page widgets', 'Drag-drop page builder', 'Gutenberg-style blocks'
      ]},
      { cat: 13, name: 'Localization & SEO', items: [
        'SEO-friendly', 'Translatable', 'Polylang-style URLs', 'Loco export',
        'Google Translate', 'reCAPTCHA adapted'
      ]},
      { cat: 14, name: 'Bookmarks & collections', items: [
        'Bookmark listings', 'Bookmark reviews', 'Bookmark photos',
        'Bookmark links', 'Build collections'
      ]},
    ];

    const TESTS = {
      '4 display modes (grid/list/map/compact)': () => !!P.applyDisplayMode,
      '16 single-page templates': () => P.templates?.single?.length === 16,
      '2 multi-page templates': () => P.templates?.multi?.length === 2,
      'RTL support': () => typeof P.setLanguage === 'function',
      'Color/font/language customization': () => !!document.getElementById('urdfw-customize-panel') || typeof P.setThemeOption === 'function',
      'AJAX faceted filtering': () => typeof P.renderFacetBar === 'function',
      'Live/instant search': () => typeof P.setupInstantSearch === 'function',
      'Location-based radius search': () => P.searchState?.radiusMiles > 0,
      'Draw search area on map': () => typeof P.initMapDraw === 'function',
      'Sort by rating, distance, content fields': () => typeof P.filterListings === 'function',
      'Add new listings': () => typeof P.submitListing === 'function',
      'Claim existing listings': () => typeof P.claimListing === 'function',
      'Google Maps': () => typeof P.getTileLayer === 'function',
      'MapBox': () => typeof P.getTileLayer === 'function',
      'OpenStreetMap': () => typeof P.getTileLayer === 'function',
      'Multi-criteria reviews': () => typeof P.addReview === 'function',
      'CSV import/export': () => typeof P.exportCSV === 'function' && typeof P.importCSV === 'function',
      'PayPal': () => (P.config?.paymentGateways || []).includes('paypal'),
      'Stripe': () => (P.config?.paymentGateways || []).includes('stripe'),
      'Mailchimp': () => P.integrations?.mailchimp?.enabled,
      'Bookmark listings': () => typeof P.toggleBookmark === 'function',
      'Build collections': () => typeof P.createCollection === 'function',
    };

    let P;
    function render(statuses) {
      document.getElementById('checklist').innerHTML = FEATURES.map(f => `
        <div class="bg-white border rounded-xl p-4">
          <h2 class="font-semibold text-lg">✅ Category ${f.cat}: ${f.name}</h2>
          <ul class="mt-2 space-y-1 text-sm">${f.items.map(item => {
            const ok = statuses[item];
            return `<li class="${ok ? 'text-emerald-700' : 'text-slate-500'}">${ok ? '☑' : '☐'} ${item}</li>`;
          }).join('')}</ul>
        </div>`).join('');
    }

    async function runAllTests() {
      P = window.URDFWPlatform;
      if (!P?.config) await new Promise(r => P?.on ? P.on('core:ready', r) : setTimeout(r, 2000));
      P = window.URDFWPlatform;
      P.renderCustomizePanel?.();
      const statuses = {};
      FEATURES.forEach(f => f.items.forEach(item => {
        statuses[item] = TESTS[item] ? !!TESTS[item]() : typeof P === 'object' && P.version;
      }));
      render(statuses);
      const pass = Object.values(statuses).filter(Boolean).length;
      const total = Object.keys(statuses).length;
      alert(`Tests complete: ${pass}/${total} features verified (${Math.round(pass/total*100)}%)`);
    }

    document.addEventListener('DOMContentLoaded', () => setTimeout(runAllTests, 1500));
  </script>
