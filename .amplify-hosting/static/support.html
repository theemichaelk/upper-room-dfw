<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support | Upper Room DFW</title>
  <meta name="description" content="Get help with your Upper Room DFW listing, billing, or member portal — contact support.">
  <link rel="canonical" href="https://upperroomdfw.com/support.html">
  <meta property="og:url" content="https://upperroomdfw.com/support.html">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-lg mx-auto p-6">
  <h1 class="text-2xl font-bold">Support Request</h1>
  <form id="support-form" class="mt-6 space-y-3 bg-white border rounded-xl p-6">
    <input name="name" required placeholder="Name" class="w-full border rounded px-3 py-2">
    <input name="email" type="email" required placeholder="Email" class="w-full border rounded px-3 py-2">
    <select name="topic" class="w-full border rounded px-3 py-2">
      <option>Billing</option><option>Listing issue</option><option>Technical</option><option>Other</option>
    </select>
    <textarea name="message" required rows="4" class="w-full border rounded px-3 py-2"></textarea>
    <div id="recaptcha"></div>
    <button type="submit" class="w-full py-2 bg-[#0369a1] text-white rounded">Submit Ticket</button>
  </form>
  <script src="js/site-forms.js"></script>
  <script src="js/platform/loader.js"></script>
  <script>
    setTimeout(() => {
      URDFWPlatform.initRecaptcha(document.getElementById('recaptcha'));
      document.getElementById('support-form').onsubmit = async (e) => {
        e.preventDefault();
        if (!URDFWPlatform.verifyRecaptcha()) return alert('Complete reCAPTCHA');
        const payload = Object.fromEntries(new FormData(e.target).entries());
        const btn = e.target.querySelector('button[type="submit"]');
        const btnHtml = btn?.innerHTML;
        if (btn) { btn.disabled = true; btn.innerHTML = 'Submitting…'; }
        try {
          const res = await window.URDFW.submitSupport(payload);
          alert('Ticket #' + (res.ticket?.id || '').slice(0, 8) + ' created. We will reply within 24h.');
          e.target.reset();
        } catch (err) {
          alert(err.message || 'Could not submit ticket. Email michaelk@tsbrenterprises.com');
        } finally {
          if (btn) { btn.disabled = false; btn.innerHTML = btnHtml; }
        }
      };
    }, 800);
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
