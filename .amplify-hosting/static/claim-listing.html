<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claim Listing | Upper Room DFW</title>
  <meta name="description" content="Claim your church or ministry listing on Upper Room DFW — verify ownership and manage your DFW directory profile.">
  <link rel="canonical" href="https://upperroomdfw.com/claim-listing.html">
  <meta property="og:url" content="https://upperroomdfw.com/claim-listing.html">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-lg mx-auto p-6">
  <h1 class="text-2xl font-bold">Claim This Listing</h1>
  <p class="text-sm text-slate-600 mt-2">Verify ownership to manage your church profile.</p>
  <form id="claim-form" class="mt-6 space-y-3 bg-white border rounded-xl p-6">
    <input name="name" required placeholder="Your name" class="w-full border rounded px-3 py-2">
    <input name="email" type="email" required placeholder="Work email" class="w-full border rounded px-3 py-2">
    <input name="phone" placeholder="Phone" class="w-full border rounded px-3 py-2">
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="paidClaim"> Paid claim ($19 — priority review)</label>
    <select name="gateway" class="w-full border rounded px-3 py-2 text-sm"><option value="paypal">PayPal</option><option value="stripe">Stripe</option><option value="2checkout">2Checkout</option></select>
    <button type="submit" class="w-full py-2 bg-[#0369a1] text-white rounded-lg">Submit Claim</button>
  </form>
  <script src="js/platform/loader.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const listingId = params.get('id') || '1';
    document.getElementById('claim-form').onsubmit = async (e) => {
      e.preventDefault();
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      const fd = new FormData(e.target);
      const paid = fd.get('paidClaim') === 'on';
      const claim = P.claimListing(listingId, { name: fd.get('name'), email: fd.get('email'), phone: fd.get('phone') }, paid);
      if (paid) P.chargeForClaim(19, listingId, fd.get('gateway'));
      P.sendEmail('contact_admin', { email: fd.get('email'), message: 'New claim for listing ' + listingId });
      alert('Claim submitted! Status: ' + claim.status);
      location.href = 'member-dashboard.html';
    };
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
