<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Directory Widgets | Upper Room DFW</title>
  <meta name="description" content="Directory widgets for search, categories, maps, and featured listings on Upper Room DFW.">
  <link rel="canonical" href="https://upperroomdfw.com/widgets.html">
  <meta property="og:url" content="https://upperroomdfw.com/widgets.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="p-6 max-w-6xl mx-auto grid md:grid-cols-3 gap-4">
  <h1 class="md:col-span-3 text-2xl font-bold">Directory Widgets (Sidebar + On-Page)</h1>
  <div id="w-search"></div><div id="w-categories"></div><div id="w-locations"></div>
  <div id="w-listings"></div><div id="w-button"></div><div id="w-map"></div>
  <div id="w-slider" class="md:col-span-2"></div>
  <div id="w-onpage-listings"></div><div id="w-onpage-categories"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/platform/loader.js"></script>
  <script>
    (async () => {
      await new Promise(r => setTimeout(r, 1000));
      const P = window.URDFWPlatform;
      const res = await fetch('data/churches.json');
      const listings = await res.json();
      ['search','categories','locations','listings','button','map','slider'].forEach((t, i) => {
        const el = document.getElementById('w-' + t);
        P.renderWidget(t, el, { listings, count: 5, height: 200, label: 'Browse DFW Churches', url: 'directory.html' });
      });
      P.renderWidget('listings', document.getElementById('w-onpage-listings'), { listings, count: 3 });
      P.renderWidget('categories', document.getElementById('w-onpage-categories'), {});
    })();
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
