<html lang="en">
<head>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

<meta name="theme-color" content="#0369a1">
  <meta name="format-detection" content="telephone=no">

  <meta charset="UTF-8">
  <title>Sign Up | Upper Room DFW</title>
  <meta name="description" content="Create your Upper Room DFW account to register a church, manage listings, and access the member portal.">
  <link rel="canonical" href="https://upperroomdfw.com/signup.html">
  <meta property="og:url" content="https://upperroomdfw.com/signup.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link rel="stylesheet" href="css/404.css">
</head>
<body class="max-w-md mx-auto p-6">
  <h1 class="text-2xl font-bold">Create Account</h1>
  <form id="signup-form" class="mt-6 space-y-3 bg-white border rounded-xl p-6">
    <input name="name" required placeholder="Full name" class="w-full border rounded px-3 py-2">
    <input name="email" type="email" required placeholder="Email" class="w-full border rounded px-3 py-2">
    <input name="password" type="password" placeholder="Password" class="w-full border rounded px-3 py-2">
    <select name="membershipType" class="w-full border rounded px-3 py-2">
      <option value="free">Free Account</option>
      <option value="free-trial">Free Trial (14 days)</option>
      <option value="one-time">One-Time Payment</option>
      <option value="recurring">Recurring Monthly</option>
      <option value="paid-trial">Paid Trial</option>
      <option value="variable">Variable Package</option>
    </select>
    <select name="package" class="w-full border rounded px-3 py-2">
      <option value="free">Free</option><option value="standard">Standard</option><option value="premium">Premium</option>
    </select>
    <input type="file" id="profile-img" accept="image/*" class="text-sm">
    <div id="recaptcha"></div>
    <button type="submit" class="w-full py-2 bg-[#0369a1] text-white rounded-lg font-semibold">Sign Up</button>
  </form>
  <p class="text-xs mt-4 text-center"><a href="member-dashboard.html">Already have an account?</a></p>
  <script src="js/platform/loader.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 800));
      const P = window.URDFWPlatform;
      P.initRecaptcha(document.getElementById('recaptcha'));
      document.getElementById('signup-form').onsubmit = async (e) => {
        e.preventDefault();
        if (!P.verifyRecaptcha()) return alert('Complete reCAPTCHA');
        const fd = new FormData(e.target);
        const user = P.registerUser({
          name: fd.get('name'), email: fd.get('email'), password: fd.get('password'),
          membershipType: fd.get('membershipType'), package: fd.get('package'),
          role: fd.get('package') === 'premium' ? 'premium-church' : 'member',
        });
        if (user.error) return alert(user.error);
        const file = document.getElementById('profile-img').files[0];
        if (file) user.profileImage = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
        if (P.api?.integrations?.subscribe) {
          await P.api.integrations.subscribe(fd.get('email'));
        } else {
          P.subscribeWithIntegrations(fd.get('email'));
        }
        alert('Welcome, ' + user.name + '! Check your email.');
        location.href = 'member-dashboard.html';
      };
    });
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
