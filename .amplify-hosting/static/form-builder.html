  <div id="form-palette" class="mt-4 flex flex-wrap gap-2">

    <div class="dd-item" draggable="true" data-id="youtube">YouTube URL</div>
  </div>

  <script>setTimeout(() => URDFWPlatform.initDragDrop('form-dropzone'), 800);</script>
