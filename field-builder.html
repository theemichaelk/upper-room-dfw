<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Field Builder | Upper Room DFW</title>
  <meta name="description" content="Build custom listing fields for DFW churches and ministries on Upper Room DFW.">
  <link rel="canonical" href="https://upperroomdfw.com/field-builder.html">
  <meta property="og:url" content="https://upperroomdfw.com/field-builder.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/platform.css">
</head>
<body class="max-w-3xl mx-auto p-6">
  <h1 class="text-2xl font-bold">Drag & Drop Field Builder</h1>
  <p class="text-sm text-slate-600">Category-based custom fields with Font Awesome icons.</p>
  <div class="grid md:grid-cols-2 gap-4 mt-4">
    <div><h3 class="font-semibold text-sm">Available Types</h3><div id="field-palette" class="dd-dropzone mt-2"></div></div>
    <div><h3 class="font-semibold text-sm">Active Fields</h3><div id="field-dropzone" class="dd-dropzone mt-2"></div></div>
  </div>
  <button onclick="saveFields()" class="mt-4 px-4 py-2 bg-[#0369a1] text-white rounded">Save Fields</button>
  <script src="js/platform/loader.js"></script>
  <script>
    const types = ['text','textarea','number','select','checkbox','youtube','icon','image'];
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      const pal = document.getElementById('field-palette');
      types.forEach(t => pal.insertAdjacentHTML('beforeend', `<div class="dd-item" draggable="true" data-id="${t}"><i class="fa-solid fa-grip-vertical"></i> ${t} field</div>`));
      const zone = document.getElementById('field-dropzone');
      P.getCustomFields().forEach(f => zone.insertAdjacentHTML('beforeend', `<div class="dd-item" draggable="true" data-id="${f.id}">${f.label} (${f.type})</div>`));
      P.initDragDrop('field-palette');
      P.initDragDrop('field-dropzone');
    });
    function saveFields() {
      const P = window.URDFWPlatform;
      const ids = [...document.querySelectorAll('#field-dropzone .dd-item')].map(el => el.dataset.id);
      const fields = ids.map((id, i) => ({ id, label: id, type: id, categories: ['Church'], icon: 'fa-star' }));
      P.saveCustomFields(fields);
      alert('Saved ' + fields.length + ' custom fields');
    };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
