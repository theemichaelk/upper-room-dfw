  <a href="directory.html" class="text-sm text-[#0369a1]">← Directory</a>
  <h1 class="text-2xl font-bold mt-4">Submit a Listing</h1>
  <p class="text-sm text-slate-600">Free or paid submission with auto/admin approval.</p>
  <form id="submit-form" class="mt-6 space-y-4 bg-white border rounded-xl p-6">
    <input name="name" required placeholder="Church / Ministry Name" class="w-full border rounded px-3 py-2">
    <select name="area" class="w-full border rounded px-3 py-2"><option>Dallas</option><option>Fort Worth</option><option>Arlington</option><option>Plano</option><option>Frisco</option></select>
    <select name="category" class="w-full border rounded px-3 py-2"><option>Church</option><option>Ministry</option><option>Youth</option><option>Outreach</option><option>Event</option></select>
    <textarea name="description" required rows="3" class="w-full border rounded px-3 py-2" placeholder="Description"></textarea>
    <input name="email" type="email" required placeholder="Contact email" class="w-full border rounded px-3 py-2">
    <select name="package" class="w-full border rounded px-3 py-2"><option value="free">Free (basic)</option><option value="standard">Standard $29/mo (featured)</option><option value="premium">Premium $79/mo (sticky+VIP)</option></select>
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="paid"> Paid submission (charge now)</label>
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="autoApprove"> Auto-approve (demo)</label>
    <div id="custom-fields" class="text-sm border-t pt-3"></div>
    <div id="recaptcha-slot"></div>
    <input type="file" id="photo-upload" accept="image/*" class="text-sm">
    <button type="submit" class="w-full py-3 bg-[#0369a1] text-white rounded-lg font-semibold">Submit Listing</button>
  </form>
  <script src="js/platform/loader.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 800));
      const P = window.URDFWPlatform;
      if (!P) return;
      const cf = document.getElementById('custom-fields');
      P.getFieldsForCategory('Church').forEach(f => {
        cf.insertAdjacentHTML('beforeend', `<div class="mb-2"><label class="text-xs">${f.label}</label>${P.renderFieldInput(f)}</div>`);
      });
      P.initRecaptcha(document.getElementById('recaptcha-slot'));
      document.getElementById('submit-form').onsubmit = async (e) => {
        e.preventDefault();
        if (!P.verifyRecaptcha()) { alert('Please complete reCAPTCHA'); return; }
        const fd = new FormData(e.target);
        const paid = fd.get('paid') === 'on';
        const listing = P.submitListing({
          name: fd.get('name'), area: fd.get('area'), category: fd.get('category'),
          description: fd.get('description'), email: fd.get('email'), package: fd.get('package'),
          featured: fd.get('package') !== 'free', sticky: fd.get('package') === 'premium',
        }, { paid, autoApprove: fd.get('autoApprove') === 'on', durationDays: 365 });
        const file = document.getElementById('photo-upload').files[0];
        if (file) await P.uploadImageAjax(file, listing.id);
        if (paid) P.chargeForSubmission(fd.get('package') === 'premium' ? 79 : 29, 'stripe');
        if (P.api?.integrations?.subscribe) {
          await P.api.integrations.subscribe(fd.get('email'));
        } else {
          P.subscribeWithIntegrations(fd.get('email'));
        }
        alert('Listing submitted! ID: ' + listing.id);
        location.href = 'directory.html';
      };
    });
  </script>
