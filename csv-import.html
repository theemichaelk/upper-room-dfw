<!-- urdfw-body:v1 -->
<!-- /urdfw-body:v1 -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5LDRMLLJ" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>


  <h1 class="text-2xl font-bold">CSV Import & Bulk Update</h1>
  <div class="mt-4 space-y-4">
    <div class="border rounded-xl p-5">
      <h3 class="font-semibold text-sm">Export</h3>
      <button onclick="doExport()" class="mt-2 px-4 py-2 bg-[#0369a1] text-white rounded text-sm">Export All to CSV</button>
    </div>
    <div class="border rounded-xl p-5">
      <h3 class="font-semibold text-sm">Import</h3>
      <textarea id="csv-input" rows="8" class="w-full border rounded p-2 text-xs font-mono mt-2" placeholder="id,name,area,category,description&#10;100,New Church,Dallas,Church,Description here"></textarea>
      <input type="file" id="csv-file" accept=".csv" class="mt-2 text-sm">
      <button onclick="doImport()" class="mt-2 px-4 py-2 border rounded text-sm">Import CSV</button>
    </div>
  </div>
  <script src="js/platform/loader.js" defer></script>
  <script>
    async function doExport() {
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      const res = await fetch('data/churches.json');
      const data = await res.json();
      P.exportCSV(data, 'urdfw-full-export.csv');
    }
    async function doImport() {
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      let text = document.getElementById('csv-input').value;
      const file = document.getElementById('csv-file').files[0];
      if (file) text = await file.text();
      const n = P.importCSV(text);
      alert('Imported ' + n + ' listings');
    }
  </script>
