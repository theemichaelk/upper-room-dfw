<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://upperroomdfw.com">
  <link rel="dns-prefetch" href="https://d4lzb9pq4mfuf.cloudfront.net">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0369a1">
  <meta name="format-detection" content="telephone=no">

  <meta charset="UTF-8">
  <title>CSV Import / Export | Upper Room DFW</title>
  <meta name="description" content="Import or export church directory data via CSV on the Upper Room DFW admin platform.">
  <link rel="canonical" href="https://upperroomdfw.com/csv-import.html">
  <meta property="og:url" content="https://upperroomdfw.com/csv-import.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="max-w-2xl mx-auto p-6">
  <h1 class="text-2xl font-bold">CSV Import & Bulk Update</h1>
  <div class="mt-4 space-y-4">
    <div class="border rounded-xl p-5">
      <h3 class="font-semibold text-sm">Export</h3>
      <button onclick="doExport()" class="mt-2 px-4 py-2 bg-[#0369a1] text-white rounded text-sm">Export All to CSV</button>
    </div>
    <div class="border rounded-xl p-5">
      <h3 class="font-semibold text-sm">Import</h3>
      <textarea id="csv-input" rows="8" class="w-full border rounded p-2 text-xs font-mono mt-2" placeholder="id,name,area,category,description&#10;100,New Church,Dallas,Church,Description here"></textarea>
      <input type="file" id="csv-file" accept=".csv" class="mt-2 text-sm">
      <button onclick="doImport()" class="mt-2 px-4 py-2 border rounded text-sm">Import CSV</button>
    </div>
  </div>
  <script src="js/platform/loader.js"></script>
  <script>
    async function doExport() {
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      const res = await fetch('data/churches.json');
      const data = await res.json();
      P.exportCSV(data, 'urdfw-full-export.csv');
    }
    async function doImport() {
      await new Promise(r => setTimeout(r, 600));
      const P = window.URDFWPlatform;
      let text = document.getElementById('csv-input').value;
      const file = document.getElementById('csv-file').files[0];
      if (file) text = await file.text();
      const n = P.importCSV(text);
      alert('Imported ' + n + ' listings');
    }
  </script>

  <footer class="bg-slate-900 text-slate-400 text-xs text-center py-4 urdfw-powered-by-footer">
    <div class="urdfw-powered-by">Powered By <a href="https://tsbrenterprises.com" class="hover:text-white underline" target="_blank" rel="noopener noreferrer">The Stone Builders Rejected</a> Michael K</div>
  </footer>
</body>
</html>
